services:
  pardploy-dev:
    build: .
    container_name: pardploy_dev
    volumes:
      - .:/app
      - /var/run/docker.sock:/var/run/docker.sock
      - target_cache:/app/backend/target
      - bun_cache:/root/.bun/install/cache
    privileged: true
    ports:
      - "8080:8080" # Axum
      - "5173:5173" # Vite + Bun
    environment:
      - RUST_LOG=debug
      - BUN_ENV=development
    restart: unless-stopped
    stdin_open: true
    tty: true

volumes:
  target_cache:
  bun_cache:
