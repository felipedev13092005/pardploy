services:
  pardploy-dev:
    build: .
    container_name: pardploy_dev
    volumes:
      - .:/app
      - /var/run/docker.sock:/var/run/docker.sock
      - target_cache:/app/backend/target
      - bun_cache:/root/.bun/install/cache
      - ./data:/app/data 
    privileged: true
    ports:
      - "8080:8080"
      - "5173:5173"
    environment:
      - RUST_LOG=debug
      # Cambiado a una sola barra después de sqlite: y añadido el modo rwc
      - DATABASE_URL=sqlite:/app/data/pardploy.db?mode=rwc
    stdin_open: true
    tty: true

volumes:
  target_cache:
  bun_cache:
